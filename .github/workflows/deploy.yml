name: Deploy Budget Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject access token
        env:
          BUDGET_PAT: ${{ secrets.BUDGET_PAT }}
        run: |
          if [ -n "$BUDGET_PAT" ]; then
            ENC=$(echo -n "$BUDGET_PAT" | base64 | tr -d '\n' | rev)
            sed -i "s|__BUDGET_TOKEN__|${ENC}|g" index.html
            echo "✓ Token injected"
          else
            echo "⚠ BUDGET_PAT secret not set"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.xlsx,*.tmp,desktop.ini,Thumbs.db,.DS_Store'
